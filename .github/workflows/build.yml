name: build

# Keep the committed bundle (index.js, which the Marketplace serves) in sync with src/.
# Triggers only on source changes, so the bot's own index.js commit doesn't re-trigger it.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'esbuild.config.mjs'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Commit rebuilt bundle if changed
        run: |
          if ! git diff --quiet -- index.js; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.js
            git commit -m "build: rebuild index.js [skip ci]"
            git push
          fi
